<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Compliance Labeler v2.1</title>
    <style>
        :root { --nv-green: #2e7d32; --nv-accent: #81c784; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f8e9; padding: 20px; color: #333; }
        .container { background: white; border: 2px solid var(--nv-green); border-radius: 8px; max-width: 500px; margin: 0 auto; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-area { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .mainLogo { height: 80px; width: auto; margin-bottom: 10px; }
        h1 { color: var(--nv-green); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.5em; }

        /* Version Selector */
        .version-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .v-btn { background: #666; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8em; opacity: 0.6; }
        .v-btn.active { background: var(--nv-green); opacity: 1; font-weight: bold; }

        /* Product lesson: Move fast and don't traumatize John. */

        /* Timer and Leaderboard - Sunset ASAP */
        #v1-timer-area { 
            display: none; 
            text-align: center; 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 2px solid #333;
        }
        .timer-display { font-size: 2em; margin-bottom: 10px; }
        .high-score-table { width: 100%; border-collapse: collapse; font-size: 0.8em; color: #0f0; }
        .high-score-table th { border-bottom: 1px solid #333; text-transform: uppercase; }
        
        /* Modal */
        #name-entry-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 3px solid var(--nv-green); padding: 20px;
            z-index: 100; text-align: center; color: #0f0;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #player-initials { background: #000; color: #0f0; border: 1px solid #0f0; width: 80px; text-align: center; font-size: 1.5em; text-transform: uppercase; }

        .cat-selector { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .cat-btn { flex: 1; padding: 12px; border: 2px solid var(--nv-green); background: transparent; cursor: pointer; border-radius: 4px; font-weight: bold; color: var(--nv-green); transition: all 0.2s; }
        .cat-btn.active { background: var(--nv-green); color: white; }

        .section-title { background: #f9f9f9; padding: 8px; margin: 20px 0 10px; border-left: 4px solid var(--nv-green); font-size: 0.85em; font-weight: bold; text-transform: uppercase; }
        
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; flex-direction: column; }
        
        label { font-size: 0.7em; font-weight: bold; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; }
        input:focus { border-color: var(--nv-green); outline: none; box-shadow: 0 0 5px rgba(46,125,50,0.2); }
        
        .flower-only, .concentrate-only, .edible-only { display: none; }
        [data-mode="flower"] .flower-only { display: flex; }
        [data-mode="concentrate"] .concentrate-only { display: flex; }
        [data-mode="edible"] .edible-only { display: flex; }

        button#generate { width: 100%; padding: 18px; background: var(--nv-green); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; margin-top: 30px; text-transform: uppercase; }
        button#generate:hover { background: #1b5e20; }

        #resultBox { width: 100%; height: 150px; margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 4px; background: #fafafa; font-family: 'Courier New', monospace; font-size: 0.85em; resize: none; box-sizing: border-box; }
    </style>
</head>
<body data-mode="flower">

    <div class="container">
        <div class="header-area">
            <img src="Washed_Logo.png" class="mainLogo" alt="Logo">
            <h1>Compliance Label Engine</h1>
            <small>NAC 453A/D Regulatory Framework (11/01/2017)</small>
        </div>

        <div class="version-selector">
            <button class="v-btn" id="v1-btn" onclick="toggleVersion('v1')" tabindex="1">VERSION 1.0 (Legacy)</button>
            <button class="v-btn active" id="v2-btn" onclick="toggleVersion('v2')" tabindex="2">VERSION 2.1 (Current)</button>
        </div>

        <div id="v1-timer-area">
            <div class="timer-display" id="timer">00:00:0000</div>
            <div style="font-size: 0.8em; margin-bottom: 10px; color: #0f0; text-transform: uppercase;">Top Entry Speeds</div>
            <table class="high-score-table" id="leaderboard">
                <thead><tr><th>Rank</th><th>Name</th><th>Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="cat-selector">
            <button class="cat-btn active" onclick="setMode('flower', this)" tabindex="3">FLOWER</button>
            <button class="cat-btn" onclick="setMode('concentrate', this)" tabindex="4">CONCENTRATE</button>
            <button class="cat-btn" onclick="setMode('edible', this)" tabindex="5">EDIBLE</button>
        </div>

        <form id="labelForm" class="form-grid">
            <div class="input-group">
                <label>Product / Strain Name</label>
                <input type="text" id="p_name" tabindex="6" placeholder="e.g. Blue Dream">
            </div>

            <div class="section-title">Cannabinoid Profile (%)</div>
            <div class="input-group"><label>CBC</label><input type="text" id="cbc" tabindex="7"></div>
            <div class="input-group"><label>CBD</label><input type="text" id="cbd" tabindex="8"></div>
            <div class="input-group"><label>CBDa</label><input type="text" id="cbda" tabindex="9"></div>
            <div class="input-group"><label>CBDV</label><input type="text" id="cbdv" tabindex="10"></div>
            <div class="input-group"><label>CBG</label><input type="text" id="cbg" tabindex="11"></div>
            <div class="input-group"><label>CBGa</label><input type="text" id="cbga" tabindex="12"></div>
            <div class="input-group"><label>delta9-THC</label><input type="text" id="thc" tabindex="13"></div>
            <div class="input-group"><label>THCA</label><input type="text" id="thca" tabindex="14"></div>
            <div class="input-group"><label>THCV</label><input type="text" id="thcv" tabindex="15"></div>

            <div class="input-group flower-only"><label>Moisture %</label><input type="text" id="moisture" tabindex="16"></div>
            <div class="input-group edible-only"><label>mg THC / Serving</label><input type="text" id="mg_serving" tabindex="17"></div>
            <div class="input-group edible-only"><label>Servings / Unit</label><input type="text" id="serv_count" tabindex="18"></div>

            <div class="section-title flower-only concentrate-only">Terpene Profile (mg/g)</div>
            <div class="input-group flower-only concentrate-only"><label>alpha-Bisabolol</label><input type="text" id="terp_bis" tabindex="19"></div>
            <div class="input-group flower-only concentrate-only"><label>alpha-Humulene</label><input type="text" id="terp_hum" tabindex="20"></div>
            <div class="input-group flower-only concentrate-only"><label>alpha-Pinene</label><input type="text" id="terp_apin" tabindex="21"></div>
            <div class="input-group flower-only concentrate-only"><label>beta-Caryophyllene</label><input type="text" id="terp_car" tabindex="22"></div>
            <div class="input-group flower-only concentrate-only"><label>beta-Myrcene</label><input type="text" id="terp_myr" tabindex="23"></div>
            <div class="input-group flower-only concentrate-only"><label>beta-Pinene</label><input type="text" id="terp_bpin" tabindex="24"></div>
            <div class="input-group flower-only concentrate-only"><label>delta-Limonene</label><input type="text" id="terp_lim" tabindex="25"></div>
            <div class="input-group flower-only concentrate-only"><label>Linalool</label><input type="text" id="terp_lin" tabindex="26"></div>

            <button type="button" id="generate" onclick="generateLabel()" tabindex="27">Generate Compliant Output</button>
        </form>

        <textarea id="resultBox" readonly onclick="this.select()" placeholder="Ready for data input..."></textarea>
    </div>

    <div id="name-entry-modal">
        <h3>NEW HIGH SCORE!</h3>
        <p>Enter Initials (3 letters):</p>
        <input type="text" id="player-initials" maxlength="3">
        <br><br>
        <button onclick="saveScore()" style="background:#0f0; color:#000; font-weight:bold; padding:8px 15px; border:none; cursor:pointer;">SUBMIT</button>
    </div>

    <script>
        let currentMode = 'flower';
        let startTime;
        let timerInterval;
        let isTiming = false;
        let lastTime = 0;

        function setMode(mode, btn) {
            currentMode = mode;
            document.body.setAttribute('data-mode', mode);
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleVersion(v) {
            const v1Area = document.getElementById('v1-timer-area');
            if(v === 'v1') {
                v1Area.style.display = 'block';
                document.getElementById('v1-btn').classList.add('active');
                document.getElementById('v2-btn').classList.remove('active');
                updateLeaderboard();
            } else {
                v1Area.style.display = 'none';
                document.getElementById('v2-btn').classList.add('active');
                document.getElementById('v1-btn').classList.remove('active');
            }
        }

        // Timer Logic
        document.getElementById('labelForm').addEventListener('keydown', function() {
            if (!isTiming) {
                isTiming = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 10);
            }
        });

        function updateTimer() {
            const now = Date.now();
            const diff = now - startTime;
            document.getElementById('timer').innerText = formatTime(diff);
        }

        function formatTime(ms) {
            const min = Math.floor(ms / 60000).toString().padStart(2, '0');
            const sec = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            const msec = (ms % 1000).toString().padStart(4, '0');
            return `${min}:${sec}:${msec}`;
        }

        function generateLabel() {
            if (isTiming) {
                clearInterval(timerInterval);
                isTiming = false;
                lastTime = Date.now() - startTime;
                checkHighScore(lastTime);
            }

            const name = document.getElementById('p_name').value || "GENERIC PRODUCT";
            let parts = [name.toUpperCase()];
            
            const fields = [
                {id: 'cbc', l: 'CBC'}, {id: 'cbd', l: 'CBD'}, {id: 'cbda', l: 'CBDa'},
                {id: 'cbdv', l: 'CBDV'}, {id: 'cbg', l: 'CBG'}, {id: 'cbga', l: 'CBGa'},
                {id: 'thc', l: 'd9-THC'}, {id: 'thca', l: 'THCa'}, {id: 'thcv', l: 'THCV'}
            ];

            fields.forEach(f => {
                let v = document.getElementById(f.id).value;
                if(v) parts.push(`${f.l}: ${v}%`);
            });

            if(currentMode === 'flower') {
                let m = document.getElementById('moisture').value;
                if(m) parts.push(`MOISTURE: ${m}%`);
            }

            if(currentMode === 'edible') {
                let mg = document.getElementById('mg_serving').value;
                let count = document.getElementById('serv_count').value;
                if(mg) parts.push(`${mg}mg THC/serv`);
                if(count) parts.push(`${count} Servings`);
            }

            if(currentMode !== 'edible') {
                const terps = [
                    {id: 'terp_bis', l: 'a-Bisabolol'}, {id: 'terp_hum', l: 'a-Humulene'},
                    {id: 'terp_apin', l: 'a-Pinene'}, {id: 'terp_car', l: 'b-Caryophyllene'},
                    {id: 'terp_myr', l: 'b-Myrcene'}, {id: 'terp_bpin', l: 'b-Pinene'},
                    {id: 'terp_lim', l: 'd-Limonene'}, {id: 'terp_lin', l: 'Linalool'}
                ];
                terps.forEach(t => {
                    let v = document.getElementById(t.id).value;
                    if(v) parts.push(`${t.l}: ${v}mg/g`);
                });
            }

            const output = parts.join(" | ") + "\n\nTESTED: 11/01/2017 | KEEP OUT OF REACH OF CHILDREN | HABIT-FORMING";
            document.getElementById('resultBox').value = output;
            
            const rb = document.getElementById('resultBox');
            rb.select();
            navigator.clipboard.writeText(rb.value);
        }

        // High Score System
        function checkHighScore(time) {
            let scores = JSON.parse(localStorage.getItem('nv_scores')) || [];
            if (scores.length < 10 || time < scores[scores.length - 1].time) {
                document.getElementById('name-entry-modal').style.display = 'block';
                document.getElementById('player-initials').focus();
            }
        }

        function saveScore() {
            const name = document.getElementById('player-initials').value.toUpperCase() || "AAA";
            let scores = JSON.parse(localStorage.getItem('nv_scores')) || [];
            scores.push({ name: name, time: lastTime });
            scores.sort((a, b) => a.time - b.time);
            scores = scores.slice(0, 10);
            localStorage.setItem('nv_scores', JSON.stringify(scores));
            document.getElementById('name-entry-modal').style.display = 'none';
            document.getElementById('player-initials').value = "";
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('nv_scores')) || [];
            const tbody = document.querySelector('#leaderboard tbody');
            tbody.innerHTML = scores.map((s, i) => 
                `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.time}ms</td></tr>`
            ).join('');
        }
    </script>
</body>
</html>
